server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Встроенный DNS Docker — резолвит имя backend во все адреса реплик
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Имя в переменной заставляет nginx резолвить backend в рантайме
        # на каждый запрос (а не кешировать один IP при старте) —
        # так запросы распределяются по всем репликам бэкенда.
        set $backend backend:8081;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
